spring.application.name=auth
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.issuer=${JWT_ISSUER:solaria-auth}
app.security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:PT15M}
app.security.jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:P7D}
app.security.firebase.enabled=${FIREBASE_ENABLED:false}
app.security.firebase.project-id=${FIREBASE_PROJECT_ID:}
